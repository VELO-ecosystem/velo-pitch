function useAnimIn(idx, cur, delay = 0) {
  const [v, setV] = useState(false);
  useEffect(() => {
    if (cur === idx) { const t = setTimeout(() => setV(true), delay); return () => clearTimeout(t); }
    else setV(false);
  }, [cur, idx, delay]);
  return v;
}

function SlideBg({ children, gradient, bgImage }) {
  const bgStyle = bgImage
    ? { backgroundImage: `url(${bgImage})`, backgroundSize: "cover", backgroundPosition: "center" }
    : { background: gradient || `radial-gradient(ellipse at 50% 40%, ${C.bluePale}40 0%, ${C.frost} 50%, ${C.snow} 100%)` };
  return (
    <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center", overflow: "hidden", overflowY: "auto", ...bgStyle }}>
      <div style={{ position: "absolute", top: -120, right: -120, width: 400, height: 400, borderRadius: "50%", border: `1px solid ${C.bluePale}50`, opacity: 0.3 }} />
      <div style={{ position: "absolute", bottom: -80, left: -80, width: 300, height: 300, borderRadius: "50%", border: `1px solid ${C.bluePale}50`, opacity: 0.2 }} />
      {children}
    </div>
  );
}

function AD({ show, delay = 0, from = "bottom", children, style = {} }) {
  const tr = { bottom: "translateY(30px)", top: "translateY(-30px)", left: "translateX(-30px)", right: "translateX(30px)", scale: "scale(0.95)" };
  return <div style={{ opacity: show ? 1 : 0, transform: show ? "none" : tr[from], transition: `all 0.7s cubic-bezier(0.16,1,0.3,1) ${delay}ms`, ...style }}>{children}</div>;
}

function HoverCard({ children, style = {} }) {
  return (
    <div style={{ ...style, transition: "all 0.3s", cursor: "default" }}
      onMouseEnter={e => { e.currentTarget.style.borderColor = C.navyDeep; e.currentTarget.style.transform = 'translateY(-2px)'; e.currentTarget.style.boxShadow = `0 8px 24px ${C.navy}18`; }}
      onMouseLeave={e => { e.currentTarget.style.borderColor = C.navy; e.currentTarget.style.transform = 'none'; e.currentTarget.style.boxShadow = 'none'; }}
    >{children}</div>
  );
}

function CardFrame({ children, style = {} }) {
  return (
    <div style={{ position: "relative", ...style }}>
      {children}
    </div>
  );
}

// Count-up animation hook
function useCountUp(target, duration, active, delay = 0) {
  const [val, setVal] = useState(0);
  const started = useRef(false);
  useEffect(() => {
    if (!active) { setVal(0); started.current = false; return; }
    if (started.current) return;
    const t = setTimeout(() => {
      started.current = true;
      const start = performance.now();
      const tick = (now) => {
        const p = Math.min((now - start) / duration, 1);
        const ease = 1 - Math.pow(1 - p, 3);
        setVal(Math.round(target * ease * 10) / 10);
        if (p < 1) requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    }, delay);
    return () => clearTimeout(t);
  }, [active, target, duration, delay]);
  return val;
}

// Animated donut chart
function DonutChart({ pct, label, size = 80, active, delay = 0 }) {
  const animPct = useCountUp(pct, 1200, active, delay);
  const r = (size - 10) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ - (animPct / 100) * circ;
  return (
    <div style={{ textAlign: "center" }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.bluePale + '40'} strokeWidth="6" />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.navy} strokeWidth="6"
          strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
          transform={`rotate(-90 ${size/2} ${size/2})`}
          style={{ transition: "stroke-dashoffset 0.05s linear" }} />
        <text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="central"
          fontFamily="Marmelad" fontSize={size * 0.22} fontWeight="700" fill={C.navy}>
          {Math.round(animPct)}%
        </text>
      </svg>
      <div style={{ fontFamily: FONT_SANS, fontSize: 11, color: C.textSoft, marginTop: 4, fontWeight: 300 }}>{label}</div>
    </div>
  );
}

// Mandala SVG for title slide
function Mandala({ active }) {
  const rings = [140, 180, 220, 260, 300];
  return (
    <svg viewBox="0 0 700 700" style={{ position: "absolute", width: "85%", height: "85%", top: "7.5%", left: "7.5%", opacity: active ? 0.22 : 0, transition: "opacity 1.5s ease" }}>
      {rings.map((r, ri) => {
        const sz = 14 + ri * 4;
        return (
        <g key={ri}>
          <circle cx="350" cy="350" r={r} fill="none" stroke="#5C7292" strokeWidth="0.8" opacity="0.6">
            <animateTransform attributeName="transform" type="rotate"
              from={`${ri % 2 === 0 ? 0 : 360} 350 350`} to={`${ri % 2 === 0 ? 360 : 0} 350 350`}
              dur={`${42 + ri * 14}s`} repeatCount="indefinite" />
          </circle>
          {Array.from({ length: 8 + ri * 4 }, (_, i) => {
            const angle = (i / (8 + ri * 4)) * Math.PI * 2;
            const cx = 350 + r * Math.cos(angle);
            const cy = 350 + r * Math.sin(angle);
            const glyph = GLYPHS[(ri * 7 + i) % GLYPHS.length];
            return (
              <image key={i} href={glyph} x={cx - sz / 2} y={cy - sz / 2} width={sz} height={sz} opacity="0.9">
                <animateTransform attributeName="transform" type="rotate"
                  from={`${ri % 2 === 0 ? 0 : 360} 350 350`} to={`${ri % 2 === 0 ? 360 : 0} 350 350`}
                  dur={`${42 + ri * 14}s`} repeatCount="indefinite" />
              </image>
            );
          })}
        </g>
        );
      })}
      <line x1="350" y1="40" x2="350" y2="660" stroke="#5C7292" strokeWidth="0.5" opacity="0.5" />
      <line x1="40" y1="350" x2="660" y2="350" stroke="#5C7292" strokeWidth="0.5" opacity="0.5" />
      <line x1="130" y1="130" x2="570" y2="570" stroke="#5C7292" strokeWidth="0.4" opacity="0.35" />
      <line x1="570" y1="130" x2="130" y2="570" stroke="#5C7292" strokeWidth="0.4" opacity="0.35" />
    </svg>
  );
}

  const focusId = activeNode || hoveredNode;
  const connectedIds = useCallback(() => {
    if (!focusId) return new Set();
    const ids = new Set([focusId]);
    CONNECTIONS.forEach(c => { if (c.from === focusId) ids.add(c.to); if (c.to === focusId) ids.add(c.from); });
    return ids;
  }, [focusId])();
  const hasFilter = !!focusId || !!activeLayer;
  const isVis = (n) => { if (!hasFilter) return true; if (activeLayer && !focusId) return n.layer === activeLayer; return connectedIds.has(n.id); };
  const isConnVis = (c) => { if (!hasFilter) return true; if (activeLayer && !focusId) { const f = NODES.find(n => n.id === c.from); const t = NODES.find(n => n.id === c.to); return f?.layer === activeLayer || t?.layer === activeLayer; } return focusId && (c.from === focusId || c.to === focusId); };
  const activeData = activeNode ? NODES.find(n => n.id === activeNode) : null;

          <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
            <defs>
              <linearGradient id="gz1" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stopColor={C.navyLight} stopOpacity="0.04" /><stop offset="100%" stopColor={C.navyLight} stopOpacity="0" /></linearGradient>

            </defs>
            <rect x="0" y="0" width={W} height={H * 0.43} rx="16" fill="url(#gz1)" />
            <rect x="0" y={H * 0.43} width={W} height={H * 0.28} fill="url(#gz2)" />
            <rect x="0" y={H * 0.71} width={W} height={H * 0.29} rx="16" fill="url(#gz3)" />

            {NODES.map(node => {
              const pos = getPos(node); const layer = LAYERS[node.layer]; const vis = isVis(node);

                  onClick={() => setActiveNode(activeNode === node.id ? null : node.id)}

                  {isAct && <circle cx={pos.x} cy={pos.y} r="34" fill={layer.color} opacity="0.08" filter="url(#glow2)"><animate attributeName="r" values="32;38;32" dur="2s" repeatCount="indefinite" /></circle>}

                  {node.label.split("\n").map((line, li) => (

                  </div>
                  <p style={{ fontFamily: FONT_SANS, fontSize: 13, lineHeight: 1.6, color: C.textSoft, fontWeight: 300, margin: 0 }}>{activeData.desc}</p>
                </div>
                <button onClick={e => { e.stopPropagation(); setActiveNode(null); }} style={{ width: 26, height: 26, borderRadius: "50%", border: "none", background: C.ice, cursor: "pointer", fontSize: 13, color: C.textSoft, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>✕</button>
              </div>
            </div>
          )}
        </div>
        <div style={{ textAlign: "center", marginTop: 6, fontFamily: FONT_SANS, fontSize: 12, color: C.textMuted }}>Нажмите на узел чтобы увидеть описание и взаимосвязи</div>

// ═══════════════ SLIDE: CONTACTS ═══════════════
function SlideContacts({ active }) {
  const s1 = useAnimIn(13, active ? 13 : -1, 200);
  const s2 = useAnimIn(13, active ? 13 : -1, 500);
  const s3 = useAnimIn(13, active ? 13 : -1, 800);
  const [qrPhase, setQrPhase] = useState(0); // 0=hidden, 1=particles flying, 2=assembled
  const [toast, setToast] = useState(null);
  const canvasRef = useRef(null);
  const animRef = useRef(null);
  const qrImgRef = useRef(null);
  
  useEffect(() => {
    if (!active) { setQrPhase(0); return; }
    const t1 = setTimeout(() => setQrPhase(1), 900);
    return () => clearTimeout(t1);
  }, [active]);

  // Particle animation
  useEffect(() => {
    if (qrPhase !== 1) return;
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const size = 240;
    canvas.width = size; canvas.height = size;
    
    // Load QR image to sample pixels
    const qrImg = new Image();
    qrImg.onload = () => {
      ctx.drawImage(qrImg, 0, 0, size, size);
      const imgData = ctx.getImageData(0, 0, size, size);
      ctx.clearRect(0, 0, size, size);
      
      // Sample grid of visible pixels
      const step = 6;
      const particles = [];
      for (let y = 0; y < size; y += step) {
        for (let x = 0; x < size; x += step) {
          const idx = (y * size + x) * 4;
          const a = imgData.data[idx + 3];
          if (a > 100) {
            // Random start position from edges/corners
            const angle = Math.random() * Math.PI * 2;
            const dist = size * 1.2 + Math.random() * size * 0.8;
            particles.push({
              tx: x, ty: y,  // target
              x: size/2 + Math.cos(angle) * dist,
              y: size/2 + Math.sin(angle) * dist,
              r: imgData.data[idx], g: imgData.data[idx+1], b: imgData.data[idx+2], a,
              size: step - 1,
              delay: Math.random() * 0.3,
              speed: 0.6 + Math.random() * 0.4,
            });
          }
        }
      }
      
      let startTime = null;
      const duration = 1800;
      
      function animate(ts) {
        if (!startTime) startTime = ts;
        const elapsed = ts - startTime;
        const progress = Math.min(elapsed / duration, 1);
        
        ctx.clearRect(0, 0, size, size);
        
        let allDone = true;
        particles.forEach(p => {
          const t = Math.max(0, Math.min(1, (progress - p.delay) / (1 - p.delay)));
          // Easing: cubic ease-out with slight overshoot
          const e = t < 1 ? 1 - Math.pow(1 - t, 3) : 1;
          
          const cx = p.x + (p.tx - p.x) * e;
          const cy = p.y + (p.ty - p.y) * e;
          const alpha = Math.min(1, t * 2); // Fade in quickly
          
          ctx.globalAlpha = alpha * (p.a / 255);
          ctx.fillStyle = "rgb(" + p.r + "," + p.g + "," + p.b + ")";
          // Start as circles, end as squares
          const roundness = Math.max(0, 1 - t * 1.5);
          if (roundness > 0.1) {
            ctx.beginPath();
            ctx.arc(cx + p.size/2, cy + p.size/2, p.size/2 * (1 - roundness * 0.3), 0, Math.PI * 2);
            ctx.fill();
          } else {
            ctx.fillRect(cx, cy, p.size, p.size);
          }
          
          if (t < 1) allDone = false;
        });
        ctx.globalAlpha = 1;
        
        if (!allDone) {
          animRef.current = requestAnimationFrame(animate);
        } else {
          // Done: show final QR image
          setQrPhase(2);
        }
      }
      animRef.current = requestAnimationFrame(animate);
    };
    qrImg.src = ICON_CONTACT_QR;
    
    return () => { if (animRef.current) cancelAnimationFrame(animRef.current); };
  }, [qrPhase]);

  const handleCopy = (text, type) => {
    navigator.clipboard.writeText(text).catch(() => {});
    setToast(type === "email" ? "Email скопирован" : "Username скопирован");
    setTimeout(() => setToast(null), 2000);
  };

  return (
    <SlideBg>
      <div style={{ maxWidth: 800, width: "92%", padding: "0 20px", display: "flex", flexDirection: "column", alignItems: "center" }}>
        <AD show={s1}>
          <h2 style={{ fontFamily: FONT, fontSize: "clamp(28px, 3.5vw, 40px)", fontFeatureSettings: '"lnum"', color: C.navy, fontWeight: 400, marginBottom: 40, textAlign: "center" }}>КОНТАКТЫ</h2>
        </AD>
        
        <AD show={s2} delay={200}>
          <div style={{ display: "flex", flexDirection: "column", gap: 14, marginBottom: 40, width: "100%", maxWidth: 440 }}>
            {/* Email */}
            <div onClick={() => handleCopy("velo.coreteam@gmail.com", "email")}
              style={{
                display: "flex", alignItems: "center", gap: 16, padding: "14px 22px",
                borderRadius: 16, background: C.white, border: "1.5px solid " + C.bluePale + "60",
                cursor: "pointer", transition: "all 0.3s", position: "relative",
              }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = C.navy; e.currentTarget.style.transform = "translateX(4px)"; e.currentTarget.style.boxShadow = "0 4px 20px " + C.navy + "10"; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = C.bluePale + "60"; e.currentTarget.style.transform = "none"; e.currentTarget.style.boxShadow = "none"; }}>
              <img src={ICON_CONTACT_EMAIL} alt="" style={{ width: 34, height: 34, flexShrink: 0 }} />
              <div>
                <div style={{ fontFamily: FONT_SANS, fontSize: 11, fontWeight: 600, color: C.navyLight, textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 2 }}>Email</div>
                <div style={{ fontFamily: FONT_SANS, fontSize: 15, fontWeight: 500, color: C.navy }}>velo.coreteam@gmail.com</div>
              </div>
            </div>
            
            {/* Telegram */}
            <div onClick={() => handleCopy("@havock_up", "tg")}
              style={{
                display: "flex", alignItems: "center", gap: 16, padding: "14px 22px",
                borderRadius: 16, background: C.white, border: "1.5px solid " + C.bluePale + "60",
                cursor: "pointer", transition: "all 0.3s", position: "relative",
              }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = C.navy; e.currentTarget.style.transform = "translateX(4px)"; e.currentTarget.style.boxShadow = "0 4px 20px " + C.navy + "10"; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = C.bluePale + "60"; e.currentTarget.style.transform = "none"; e.currentTarget.style.boxShadow = "none"; }}>
              <img src={ICON_CONTACT_TELEGRAM} alt="" style={{ width: 34, height: 34, flexShrink: 0 }} />
              <div>
                <div style={{ fontFamily: FONT_SANS, fontSize: 11, fontWeight: 600, color: C.navyLight, textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 2 }}>Telegram</div>
                <div style={{ fontFamily: FONT_SANS, fontSize: 15, fontWeight: 500, color: C.navy }}>@havock_up</div>
              </div>
            </div>
          </div>
        </AD>

        <AD show={s3} delay={400}>
          {/* QR Code with particle assembly */}
          <a href="https://t.me/havock_up" target="_blank" rel="noopener noreferrer"
            style={{ display: "block", position: "relative", width: 240, height: 240, cursor: "pointer", textDecoration: "none", transition: "transform 0.3s" }}
            onMouseEnter={e => { e.currentTarget.style.transform = "scale(1.03)"; }}
            onMouseLeave={e => { e.currentTarget.style.transform = "none"; }}>
            {/* Canvas for particle animation */}
            <canvas ref={canvasRef} style={{
              position: "absolute", top: 0, left: 0, width: 240, height: 240,
              opacity: qrPhase === 1 ? 1 : 0,
              transition: "opacity 0.3s",
              borderRadius: 12,
            }} />
            {/* Final crisp QR image */}
            <img src={ICON_CONTACT_QR} alt="QR" style={{
              width: 240, height: 240, display: "block", borderRadius: 12,
              opacity: qrPhase === 2 ? 1 : 0,
              transition: "opacity 0.4s ease-in",
            }} />
          </a>
        </AD>
      </div>
      
      {/* Toast notification */}
      {toast && (
        <div style={{
          position: "fixed", bottom: 32, left: "50%", transform: "translateX(-50%)",
          padding: "10px 24px", borderRadius: 12,
          background: C.navy, color: C.white,
          fontFamily: FONT_SANS, fontSize: 13, fontWeight: 500,
          boxShadow: "0 8px 30px " + C.navy + "30",
          animation: "toastIn 0.3s ease-out",
          zIndex: 100,
          display: "flex", alignItems: "center", gap: 8,
        }}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="white" strokeWidth="1.5"/><path d="M5 8.5L7 10.5L11 6" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
          {toast}
        </div>
      )}
    </SlideBg>
  );
}

const SLIDES = [
  { component: SlideTitle, label: "VELΘ" },
  { component: SlideAbout, label: "О проекте" },
  { component: SlideAudience, label: "Аудитория" },
  { component: SlideSolution, label: "Решение" },
  { component: SlideEcosystem, label: "Экосистема" },
  { component: SlideArch, label: "AI архитектура" },
  { component: SlideMarket, label: "Рынок" },
  { component: SlideGrowth, label: "Рост" },
  { component: SlideComp, label: "Конкуренты" },
  { component: SlideMoney, label: "Монетизация" },
  { component: SlidePricing, label: "Тарифы" },
  { component: SlideTeam, label: "Команда" },
  { component: SlideAdvisors, label: "Эксперты" },
  { component: SlideContacts, label: "Контакты" },
];

function VeloPitch() {
  const [current, setCurrent] = useState(0);
  const [dir, setDir] = useState(0);
  const [trans, setTrans] = useState(false);
  const [sideNav, setSideNav] = useState(false);
  const touchRef = useRef(null);

  const goTo = useCallback((i) => {
    if (i === current || trans || i < 0 || i >= SLIDES.length) return;
    setDir(i > current ? 1 : -1); setTrans(true);
    setTimeout(() => { setCurrent(i); setTimeout(() => setTrans(false), 50); }, 300);
  }, [current, trans]);

  const next = useCallback(() => goTo(current + 1), [current, goTo]);
  const prev = useCallback(() => goTo(current - 1), [current, goTo]);

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "ArrowRight" || e.key === "ArrowDown" || e.key === " ") { e.preventDefault(); next(); }
      if (e.key === "ArrowLeft" || e.key === "ArrowUp") { e.preventDefault(); prev(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [next, prev]);

  const SlideComp = SLIDES[current].component;

  return (
    <div style={{ width: "100vw", height: "100vh", overflow: "hidden", position: "relative", background: C.snow, fontFamily: FONT_SANS }}
      onTouchStart={e => { touchRef.current = e.touches[0].clientX; }}
      onTouchEnd={e => { if (!touchRef.current) return; const d = touchRef.current - e.changedTouches[0].clientX; if (Math.abs(d) > 50) { d > 0 ? next() : prev(); } touchRef.current = null; }}
    >
      <div style={{ position: "absolute", inset: 0, opacity: trans ? 0 : 1, transform: trans ? `translateX(${dir * 40}px)` : "none", transition: "all 0.35s cubic-bezier(0.4,0,0.2,1)" }}>
        <SlideComp active={!trans} />
      </div>

      {/* Side navigation trigger zone */}
      <div
        style={{ position: "absolute", left: 0, top: 0, width: 20, height: "100%", zIndex: 200 }}
        onMouseEnter={() => setSideNav(true)}
      />
      {/* Side navigation panel */}
      <div
        style={{
          position: "absolute", left: 0, top: 0, height: "100%", width: 220,
          background: `${C.white}F5`, backdropFilter: "blur(16px)",
          borderRight: `1px solid ${C.bluePale}40`,
          transform: sideNav ? "translateX(0)" : "translateX(-220px)",
          transition: "transform 0.3s cubic-bezier(0.4,0,0.2,1)",
          zIndex: 200, display: "flex", flexDirection: "column", justifyContent: "center",
          padding: "20px 0",
        }}
        onMouseLeave={() => setSideNav(false)}
      >
        <div style={{ fontFamily: FONT_SANS, fontSize: 10, fontWeight: 600, color: C.textMuted, letterSpacing: 2, textTransform: "uppercase", padding: "0 20px", marginBottom: 12 }}>НАВИГАЦИЯ</div>
        {SLIDES.map((s, i) => (
          <button key={i} onClick={() => { goTo(i); setSideNav(false); }}
            style={{
              display: "flex", alignItems: "center", gap: 10, width: "100%",
              padding: "8px 20px", border: "none", cursor: "pointer",
              background: current === i ? C.ice : "transparent",
              borderLeft: current === i ? `3px solid ${C.navy}` : "3px solid transparent",
              transition: "all 0.2s", textAlign: "left",
            }}
            onMouseEnter={e => { if (current !== i) e.currentTarget.style.background = C.frost; }}
            onMouseLeave={e => { if (current !== i) e.currentTarget.style.background = "transparent"; }}
          >
            <span style={{ fontFamily: FONT_SANS, fontSize: 11, fontWeight: 600, color: C.textMuted, width: 18 }}>{i + 1}</span>
            <span style={{ fontFamily: FONT_SANS, fontSize: 13, fontWeight: current === i ? 600 : 400, color: current === i ? C.navy : C.textSoft }}>{s.label}</span>
          </button>
        ))}
      </div>

      {current > 0 && (
        <button onClick={prev} style={{ position: "absolute", left: 16, top: "50%", transform: "translateY(-50%)", width: 40, height: 40, borderRadius: "50%", border: `1px solid ${C.bluePale}`, background: `${C.white}CC`, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", color: C.navy, fontSize: 18, transition: "all 0.2s", zIndex: 100, backdropFilter: "blur(8px)" }}
          onMouseEnter={e => { e.currentTarget.style.background = C.navy; e.currentTarget.style.color = C.white; }}
          onMouseLeave={e => { e.currentTarget.style.background = C.white + 'CC'; e.currentTarget.style.color = C.navy; }}>←</button>
      )}
      {current < SLIDES.length - 1 && (
        <button onClick={next} style={{ position: "absolute", right: 16, top: "50%", transform: "translateY(-50%)", width: 40, height: 40, borderRadius: "50%", border: `1px solid ${C.bluePale}`, background: `${C.white}CC`, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", color: C.navy, fontSize: 18, transition: "all 0.2s", zIndex: 100, backdropFilter: "blur(8px)" }}
          onMouseEnter={e => { e.currentTarget.style.background = C.navy; e.currentTarget.style.color = C.white; }}
          onMouseLeave={e => { e.currentTarget.style.background = C.white + 'CC'; e.currentTarget.style.color = C.navy; }}>→</button>
      )}

      <div style={{ position: "absolute", bottom: 16, left: "50%", transform: "translateX(-50%)", display: "flex", gap: 5, alignItems: "center", zIndex: 100, background: `${C.white}DD`, borderRadius: 100, padding: "6px 14px", backdropFilter: "blur(10px)", border: `1px solid ${C.bluePale}40` }}>
        {SLIDES.map((s, i) => (
          <button key={i} onClick={() => goTo(i)} title={s.label} style={{ width: current === i ? 22 : 7, height: 7, borderRadius: 100, background: current === i ? C.navy : C.bluePale, border: "none", cursor: "pointer", transition: "all 0.3s", opacity: current === i ? 1 : 0.6 }} />
        ))}
      </div>

      <div style={{ position: "absolute", top: 16, right: 16, zIndex: 100, fontFamily: FONT_SANS, fontSize: 12, color: C.textMuted, background: `${C.white}BB`, borderRadius: 8, padding: "4px 10px", backdropFilter: "blur(8px)" }}>
        {current + 1} / {SLIDES.length}
      </div>

      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Marmelad&display=swap');
        * { box-sizing: border-box; margin: 0; }
        @keyframes ecoSlideUp { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @keyframes contactFadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(16px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @keyframes tabFadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
      `}</style>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(VeloPitch));
</script>
</body>
</html>
